name: run-js-tests

on:
  push:
    branches: [main]
    paths:
      - '**.js'
      - '**.css'
      - '.github/workflows/run-js-tests.yml'
      - 'package.json'
      - 'bun.lock'
      - 'playwright.config.js'
  pull_request:
    paths:
      - '**.js'
      - '**.css'
      - '.github/workflows/run-js-tests.yml'
      - 'package.json'
      - 'bun.lock'
      - 'playwright.config.js'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Bun unit (happy-dom)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun run test

  browser:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser + system deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run Playwright tests
        run: bun run test:browser
